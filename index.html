<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
<meta charset="UTF-8">
<title>د اجناسو مدیریت سیستم</title>

<style>
body{font-family:Arial;background:#eef2f3;margin:0;direction:rtl;}
.header{background:#006400;color:#fff;padding:15px;text-align:center;font-size:22px;}
.box{background:#fff;margin:15px;padding:15px;border-radius:10px;}
input,select{padding:6px;margin:4px;border:1px solid #ccc;border-radius:5px;width:140px;}
button{background:#006400;color:white;padding:7px 12px;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#004d00;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;font-size:13px;}
th{background:#006400;color:white;}
</style>

</head>

<body>

<div class="header">د اجناسو رسمي مدیریت سیستم</div>

<div id="loginBox" class="box">
<h3>ننوتل</h3>
<input id="phoneInput" placeholder="تلیفون نمبر">
<input id="pinInput" placeholder="پټ کوډ">

<select id="province">
<option value="">مرکزي اداره</option>
<option>کابل</option><option>کندهار</option><option>هلمند</option>
</select>

<br>
<button onclick="login()">داخل شه</button>
</div>

<div id="app" style="display:none;">

<div class="box">

<input id="serial" placeholder="مسلسل نمبر">
<input id="doc" placeholder="د سند ګڼه">
<input id="date" placeholder="نېټه">
<input id="giver" placeholder="ورکوونکی">
<input id="receiver" placeholder="اخیستونکی">
<input id="department" placeholder="شعبه">

<select id="category">
<option value="">ډول</option>
<option>فرنیچر</option>
<option>برقي</option>
</select>

<input id="rank" placeholder="بست">
<input id="item" placeholder="نوم">
<input id="spec" placeholder="مشخصات">
<input id="sn" placeholder="سریال">
<input id="source" placeholder="سرچینه">
<input id="color" placeholder="رنګ">
<input id="qty" type="number" placeholder="تعداد">
<input id="unit" placeholder="واحد">
<input id="price" type="number" placeholder="بیه">
<input id="total" placeholder="مجموعه" readonly>
<input id="note" placeholder="یادښت">

<br>
<button onclick="addItem()">اضافه</button>
<button onclick="updateItem()">اصلاح</button>
<button onclick="window.print()">چاپ</button>

</div>

<div class="box">

<input id="searchId" placeholder="ID">
<button onclick="searchItems()">Search</button>
<button onclick="loadItems()">Reset</button>

<table>
<thead>
<tr>
<th>شمېره</th>
<th>نوم</th>
<th>تعداد</th>
<th>ولایت</th>
<th>عمل</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDQG_BNOSJievJwmpOU96pZcPnWzQW-Ebo",
authDomain:"inventory-system-64d88.firebaseapp.com",
projectId:"inventory-system-64d88"
});

const db = getFirestore(app);

let currentProvince="";
let isAdmin=false;
let allItems=[];
let currentEditId="";

/* LOGIN */
window.login=function(){
let phone=phoneInput.value;
let pin=pinInput.value;

if(phone==="0704890041" && pin==="9999"){
isAdmin=true;
}else{
currentProvince=province.value;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

loadItems();
};

/* TOTAL */
qty.oninput = price.oninput = function(){
total.value = (qty.value||0) * (price.value||0);
};

/* LOAD */
function loadItems(){
onSnapshot(collection(db,"items"),snap=>{
tbody.innerHTML="";
allItems=[];

snap.forEach(d=>{
let x=d.data();
x.idd=d.id;

if(isAdmin || x.province===currentProvince){
allItems.push(x);

tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.item||""}</td>
<td>${x.qty||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>`;
}
});
});
}

/* ADD */
window.addItem=async function(){
let id=prompt("ID ولیکه");
if(!id) return;

await addDoc(collection(db,"items"),{
serial:serial.value,
doc:doc.value,
date:date.value,
giver:giver.value,
receiver:receiver.value,
department:department.value,
rank:rank.value,
item:item.value,
category:category.value,
spec:spec.value,
sn:sn.value,
source:source.value,
color:color.value,
qty:qty.value,
unit:unit.value,
price:price.value,
total:total.value,
note:note.value,
province:isAdmin ? prompt("ولایت") : currentProvince,
id:id
});
};

/* DELETE */
window.delItem=async function(id){
if(prompt("کوډ")!=="1234") return;
await deleteDoc(doc(db,"items",id));
};

/* SEARCH */
window.searchItems=function(){
let id=searchId.value;
tbody.innerHTML="";

allItems.forEach(x=>{
if(x.id===id){

currentEditId=x.idd;

serial.value=x.serial||"";
doc.value=x.doc||"";
date.value=x.date||"";
giver.value=x.giver||"";
receiver.value=x.receiver||"";
department.value=x.department||"";
rank.value=x.rank||"";
item.value=x.item||"";
category.value=x.category||"";
spec.value=x.spec||"";
sn.value=x.sn||"";
source.value=x.source||"";
color.value=x.color||"";
qty.value=x.qty||"";
unit.value=x.unit||"";
price.value=x.price||"";
total.value=x.total||"";
note.value=x.note||"";

tbody.innerHTML+=`
<tr>
<td>${x.serial}</td>
<td>${x.item}</td>
<td>${x.qty}</td>
<td>${x.province}</td>
<td></td>
</tr>`;
}
});
};

/* UPDATE */
window.updateItem=async function(){

if(!currentEditId){
alert("اول search وکړه");
return;
}

await deleteDoc(doc(db,"items",currentEditId));

await addDoc(collection(db,"items"),{
serial:serial.value,
doc:doc.value,
date:date.value,
giver:giver.value,
receiver:receiver.value,
department:department.value,
rank:rank.value,
item:item.value,
category:category.value,
spec:spec.value,
sn:sn.value,
source:source.value,
color:color.value,
qty:qty.value,
unit:unit.value,
price:price.value,
total:total.value,
note:note.value,
province:isAdmin ? prompt("ولایت") : currentProvince,
id:searchId.value
});

alert("اصلاح شو");
};

</script>

</body>
</html>
