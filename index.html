<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
<meta charset="UTF-8">
<title>د اجناسو مدیریت سیستم</title>

<style>

body{
font-family:Arial;
background:#eef2f3;
margin:0;
direction:rtl;
}

.header{
background:#006400;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
}

.box{
background:#fff;
margin:15px;
padding:15px;
border-radius:10px;
}

input,select{
padding:6px;
margin:4px;
border:1px solid #ccc;
border-radius:5px;
width:140px;
}

button{
background:#006400;
color:white;
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#004d00;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px;
}

th{
background:#006400;
color:white;
}

/* NEWS */
#newsList{
list-style:none;
padding:0;
animation: scrollNews 20s linear infinite;
}

#newsList li{
background:#f1f1f1;
margin:5px;
padding:6px;
border-radius:5px;
display:flex;
justify-content:space-between;
}

/* ANIMATION */
@keyframes scrollNews{
0%{transform:translateY(100%);}
100%{transform:translateY(-100%);}
}

/* 📱 MOBILE */
@media (max-width:600px){

input,select{
width:100%;
}

button{
width:100%;
margin-top:5px;
}

.box{
margin:8px;
padding:10px;
}

.header{
font-size:18px;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
font-size:12px;
}

#newsInput,#searchId{
width:100%;
}

#newsContainer{
height:100px;
}

}

</style>

</head>

<body>

<input id="newsInput" placeholder="خبر ولیکه">

<div id="newsContainer" style="height:120px; overflow:hidden;">
<ul id="newsList"></ul>
</div>

<div class="box">

<input id="searchId" placeholder="ID لټون">
<select id="searchDept"></select>

<select id="searchSection">
<option value="">ټول</option>
<option>فرنیچر</option>
<option>برقي وسایل</option>
<option>مفروشات</option>
<option>متفرقه</option>
<option>لوښي</option>
</select>

<!-- 👇 selectونه دلته راځي -->
<select id="searchDepartment">...</select>
<select id="searchCategory">
<option value="">ټول ډولونه</option>
<option>فرنیچر</option>
<option>مفروشات</option>
<option>برقي وسایل</option>
<option>لوښي</option>
<option>متفرقه</option>
</select>
<button onclick="searchItems()">لټون</button>
<button onclick="loadItems()">بېرته ټول</button>

<h3>🏬 ګدام (Warehouse)</h3>
<table>
<thead>
<tr>
<th>نوم</th>
<th>مشخصات</th>
<th>تعداد</th>
<th>واحد</th>
<th>سند</th>
<th>نېټه</th>
<th>بیه</th>
<th>موجود</th>
</tr>
</thead>
<tbody id="wbody"></tbody>
</table>

<input id="w_name" placeholder="د جنس نوم">
<input id="w_spec" placeholder="مشخصات">
<input id="w_qty" type="number" placeholder="تعداد">
<input id="w_unit" placeholder="واحد">
<input id="w_doc" placeholder="د سند ګڼه">
<input id="w_date" placeholder="نېټه">
<input id="w_price" type="number" placeholder="فی دانه بیه">
<input id="w_stock" type="number" placeholder="موجود تعداد">

<br>
<button onclick="addWarehouse()">ګدام ته اضافه کړه</button>
<table>
<thead>
<tr>
<th>مسلسل نمبر</th>
<th>د سند ګڼه</th>
<th>نېټه</th>
<th>ورکوونکی</th>
<th>اخیستونکی</th>
<th>شعبه</th>
<th>بست</th>
<th>د جنس نوم</th>
<th>مشخصات</th>
<th>سریال</th>
<th>سرچینه</th>
<th>رنګ</th>
<th>تعداد</th>
<th>واحد</th>
<th>بیه</th>
<th>مجموعه</th>
<th>ډول</th>
<th>ولایت</th>
<th>عمل</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div> <!-- ✅ app دلته بند کړه -->



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseApp = initializeApp({
apiKey:"AIzaSyDQG_BNOSJievJwmpOU96pZcPnWzQW-Ebo",
authDomain:"inventory-system-64d88.firebaseapp.com",
projectId:"inventory-system-64d88"
});

const db = getFirestore(firebaseApp);

let currentProvince="";
let isAdmin=false;
let allItems=[];
let currentEditId = "";
let dashboardMode = "province";
let departments = JSON.parse(localStorage.getItem("depts")) || [];

function loadDepts(){
let sel = document.getElementById("department");
sel.innerHTML = "";

departments.forEach(d=>{
sel.innerHTML += `<option>${d}</option>`;
});
}

window.addDept = function(){

let name = document.getElementById("newDept").value;
if(!name) return;

// یوازې مرکزي اداره اجازه لري
if(!isAdmin){
alert("صرف مرکزي اداره اجازه لري!");
return;
}

departments.push(name);
localStorage.setItem("depts", JSON.stringify(departments));

document.getElementById("newDept").value="";
loadDepts();
};

/* LOGIN */
window.login = function () {

let phone = document.getElementById("phoneInput").value;
let pin = document.getElementById("pinInput").value;
let province = document.getElementById("province").value;

// 🔐 CENTRAL LOGIN
if (phone === "0700000000" && pin === "9999") {
    isAdmin = true;
    currentProvince = "مرکزي اداره";
    dashboardMode = "central";   // 👈 دا اضافه کړه
}

// 🏢 PROVINCE LOGIN SYSTEM
else {
dashboardMode = "province";
    if (!province) {
        alert("ولایت انتخاب کړه!");
        return;
    }

    // 🔑 هر ولایت خپل PIN لري
    const provincePins = {
        "کابل": "1111",
        "کاپیسا": "2222",
        "پنجشیر": "3333",
        "پروان": "4444",
        "بامیان": "5555",
        "دایکندی": "6666",
        "پکتیا": "7777",
        "پکتیکا": "8888",
        "خوست": "9999",
        "لوګر": "0000",
        "میدان وردګ": "1112",
        "غزنی": "1113",
        "کندهار": "1114",
        "زابل": "1115",
        "ارزګان": "1116",
        "هلمند": "1117",
        "هرات": "1118",
        "نیمروز": "1119",
        "فراه": "1110",
        "غور": "1211",
        "بادغیس": "1311",
        "بلخ": "1411",
        "سمنګان": "1511",
        "سرپل": "1611",
        "جوزجان": "1711",
        "فاریاب": "1811",
        "کندوز": "1911",
        "بغلان": "1011",
        "تخار": "1234",
        "بدخشان": "5678",
        "ننګرهار": "9012",
        "کنړ": "3456",
        "لغمان": "7890",
        "نورستان": "4321",

        // نور ولایتونه هم اضافه کولی شې
    };

    if (pin !== provincePins[province]) {
        alert("پټ کوډ غلط دی!");
        return;
    }

    isAdmin = false;
    currentProvince = province;
}

// UI change
document.getElementById("loginBox").style.display = "none";
document.getElementById("app").style.display = "block";

loadItems();
loadWarehouse();
};

/* ENTER NEXT */
document.querySelectorAll("#app input").forEach((el,i,arr)=>{
el.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
arr[i+1]?.focus();
}
});
});

/* LOAD DATA */
function loadItems(){
onSnapshot(collection(db,"items"),snap=>{
let tbody=document.getElementById("tbody");
tbody.innerHTML="";
allItems=[];

snap.forEach(d=>{
updateStats();
let x=d.data();
x.idd=d.id;

if (dashboardMode === "central") {

allItems.push(x);

tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.giver||""}</td>
<td>${x.receiver||""}</td>
<td>${x.department||""}</td>
<td>${x.rank||""}</td>
<td>${x.item||""}</td>
<td>${x.spec||""}</td>
<td>${x.sn||""}</td>
<td>${x.source||""}</td>
<td>${x.color||""}</td>
<td>${x.qty||""}</td>
<td>${x.unit||""}</td>
<td>${x.price||""}</td>
<td>${x.total||""}</td>
<td>${x.category||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>`;

}
else if(x.province===currentProvince){

allItems.push(x);

tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.giver||""}</td>
<td>${x.receiver||""}</td>
<td>${x.department||""}</td>
<td>${x.rank||""}</td>
<td>${x.item||""}</td>
<td>${x.spec||""}</td>
<td>${x.sn||""}</td>
<td>${x.source||""}</td>
<td>${x.color||""}</td>
<td>${x.qty||""}</td>
<td>${x.unit||""}</td>
<td>${x.price||""}</td>
<td>${x.total||""}</td>
<td>${x.category||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>`;

}
});
});
}

/* ADD ITEM */
window.addItem=async function(){

let id=prompt("ID ولیکه");
if(!id) return;

await addDoc(collection(db,"items"),{

serial:document.getElementById("serial").value,
doc:document.getElementById("doc").value,
date:document.getElementById("date").value,
giver:document.getElementById("giver").value,
receiver:document.getElementById("receiver").value,
department:document.getElementById("department").value,
section:document.getElementById("section").value,
rank:document.getElementById("rank").value,
item:document.getElementById("item").value,
category:document.getElementById("category").value,
spec:document.getElementById("spec").value,
sn:document.getElementById("sn").value,
source:document.getElementById("source").value,
color:document.getElementById("color").value,
qty:document.getElementById("qty").value,
unit:document.getElementById("unit").value,
price:document.getElementById("price").value,
total:document.getElementById("total").value,
note:document.getElementById("note").value,

province: isAdmin ? "مرکزي اداره" : currentProvince,
id:id

});

};

/* DELETE */
window.delItem=async function(id){
if(prompt("پټ کوډ")!=="1234") return;
await deleteDoc(doc(db,"items",id));
};

/* SEARCH */
window.searchItems=function(){
    let id = document.getElementById("searchId").value;
let department = document.getElementById("searchDepartment").value;
let category = document.getElementById("searchCategory").value;

let tbody = document.getElementById("tbody");
tbody.innerHTML = "";

allItems.forEach(x=>{

if(
(!id || x.idd === id) &&
(!department || x.department === department) &&
(!category || x.category === category)
){

tbody.innerHTML += `
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.giver||""}</td>
<td>${x.receiver||""}</td>
<td>${x.department||""}</td>
<td>${x.rank||""}</td>
<td>${x.item||""}</td>
<td>${x.spec||""}</td>
<td>${x.sn||""}</td>
<td>${x.source||""}</td>
<td>${x.color||""}</td>
<td>${x.qty||""}</td>
<td>${x.unit||""}</td>
<td>${x.price||""}</td>
<td>${x.total||""}</td>
<td>${x.category||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>
`;

}

});

};
let allNews = [];

// LOAD
function loadNews(){
let data = localStorage.getItem("news");
allNews = data ? JSON.parse(data) : [];

let list = document.getElementById("newsList");
list.innerHTML = "";

allNews.forEach((n,i)=>{
list.innerHTML += `
<li>
<span>${n.text} <br><small>${n.date}</small></span>
<button onclick="delNews(${i})">❌</button>
</li>`;
});
}

// ADD
function addNews(){
let txt = document.getElementById("newsInput").value;

if(!txt){
alert("خبر ولیکه!");
return;
}

let now = new Date().toLocaleString();

allNews.push({
text: txt,
date: now
});

localStorage.setItem("news", JSON.stringify(allNews));

document.getElementById("newsInput").value="";
loadNews();
}

// DELETE
function delNews(i){
allNews.splice(i,1);
localStorage.setItem("news", JSON.stringify(allNews));
loadNews();
}

// START
loadNews();
function updateStats(){
if(dashboardMode !== "central") return;

document.getElementById("stats").innerHTML =
"📊 ټول اجناس: " + allItems.length;
}
window.addWarehouse = async function(){

await addDoc(collection(db,"warehouse"),{

name: document.getElementById("w_name").value,
spec: document.getElementById("w_spec").value,
qty: document.getElementById("w_qty").value,
unit: document.getElementById("w_unit").value,
doc: document.getElementById("w_doc").value,
date: document.getElementById("w_date").value,
price: document.getElementById("w_price").value,
stock: document.getElementById("w_stock").value,

province: isAdmin ? "مرکزي اداره" : currentProvince

});

alert("ګدام ته اضافه شو ✅");

};
function loadWarehouse(){

onSnapshot(collection(db,"warehouse"),snap=>{

let wbody = document.getElementById("wbody");
wbody.innerHTML = "";

snap.forEach(d=>{

let x = d.data();

if (dashboardMode === "central" || x.province === currentProvince){

wbody.innerHTML += `
<tr>
<td>${x.name || ""}</td>
<td>${x.spec || ""}</td>
<td>${x.qty || ""}</td>
<td>${x.unit || ""}</td>
<td>${x.doc || ""}</td>
<td>${x.date || ""}</td>
<td>${x.price || ""}</td>
<td>${x.stock || ""}</td>
</tr>
`;

}

});

});

}

</script>


</body>
</html>
