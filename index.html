<!DOCTYPE html>
<html>
<head>
<title>د اجناسو سیستم</title>
<meta charset="UTF-8">

<style>
body{font-family:Arial;background:#eef;padding:20px;}
.box{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select{margin:4px;padding:6px;width:130px;}
button{padding:6px 12px;background:#007bff;color:#fff;border:none;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:5px;font-size:12px;}
th{background:#007bff;color:white;}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h3>ننوتل</h3>
<input type="password" id="pass" placeholder="پاسورډ">
<button onclick="login()">داخل شه</button>
</div>

<div id="mainApp" style="display:none;">

<div class="box">
<select id="dept"></select>
<input id="newDept" placeholder="نوی ریاست">
<button onclick="addDept()">ریاست اضافه کړه</button>

<select id="type">
<option>فرنیچر</option>
<option>مفروشات</option>
<option>برقی وسایل</option>
<option>لوښي</option>
<option>متفرقه</option>
</select>
</div>

<div class="box">

<input id="serial" placeholder="مسلسل">
<input id="doc" placeholder="سند">
<input id="date" placeholder="نېټه">
<input id="giver" placeholder="ورکوونکی">
<input id="receiver" placeholder="اخیستونکی">
<input id="deptField" placeholder="شعبه">
<input id="rank" placeholder="بست">
<input id="item" placeholder="جنس">
<input id="spec" placeholder="مشخصات">
<input id="sn" placeholder="سریال">
<input id="source" placeholder="سرچینه">
<input id="color" placeholder="رنګ">
<input id="qty" type="number" placeholder="تعداد">
<input id="unit" placeholder="واحد">
<input id="price" type="number" placeholder="فیات">
<input id="total" readonly placeholder="مجموعه">
<input id="note" placeholder="کتنې">

<br>
<button onclick="addItem()">اضافه کړه</button>

</div>

<div class="box">
<input id="searchDept" placeholder="ریاست">
<input id="searchId" placeholder="ID">
<button onclick="searchItems()">Search</button>
<button onclick="resetTable()">Reset</button>
</div>

<div class="box">
<table>
<thead>
<tr>
<th>مسلسل</th><th>سند</th><th>نېټه</th><th>ورکوونکی</th><th>اخیستونکی</th>
<th>شعبه</th><th>بست</th><th>جنس</th><th>مشخصات</th><th>سریال</th>
<th>سرچینه</th><th>رنګ</th><th>تعداد</th><th>واحد</th><th>فیات</th>
<th>مجموعه</th><th>کتنې</th><th>ریاست</th><th>بخش</th><th>عمل</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseApp = initializeApp({
apiKey:"AIzaSyDQG_BNOSJievJwmpOU96pZcPnWzQW-Ebo",
authDomain:"inventory-system-64d88.firebaseapp.com",
projectId:"inventory-system-64d88"
});

const db = getFirestore(firebaseApp);

let allItems=[];

// login
window.login=function(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("mainApp").style.display="block";
loadDept();
liveItems();
}else{
alert("پاسورډ غلط دی");
}
};

// total
document.getElementById("qty").oninput=
document.getElementById("price").oninput=function(){
let q=document.getElementById("qty").value || 0;
let p=document.getElementById("price").value || 0;
document.getElementById("total").value = q * p;
};

// departments
function loadDept(){
onSnapshot(collection(db,"departments"),snap=>{
let d=document.getElementById("dept");
d.innerHTML="";
snap.forEach(x=>{
let op=document.createElement("option");
op.text=x.data().name;
d.add(op);
});
});
}

// add dept
window.addDept=async function(){
let val=document.getElementById("newDept").value;
if(!val) return;
await addDoc(collection(db,"departments"),{name:val});
document.getElementById("newDept").value="";
};

// live items
function liveItems(){
onSnapshot(collection(db,"items"),snap=>{
allItems=[];
document.getElementById("tbody").innerHTML="";
snap.forEach(d=>{
let x=d.data();
x.idd=d.id;
allItems.push(x);
draw(x);
});
});
}

// draw
function draw(x){
document.getElementById("tbody").innerHTML+=`
<tr>
<td>${x.serial||""}</td><td>${x.doc||""}</td><td>${x.date||""}</td>
<td>${x.giver||""}</td><td>${x.receiver||""}</td>
<td>${x.deptField||""}</td><td>${x.rank||""}</td>
<td>${x.item||""}</td><td>${x.spec||""}</td>
<td>${x.sn||""}</td><td>${x.source||""}</td>
<td>${x.color||""}</td><td>${x.qty||""}</td>
<td>${x.unit||""}</td><td>${x.price||""}</td>
<td>${x.total||""}</td><td>${x.note||""}</td>
<td>${x.dept||""}</td><td>${x.type||""}</td>
<td><button onclick="del('${x.idd}')">❌</button></td>
</tr>`;
}

// add item
window.addItem=async function(){
try{

let empId=prompt("ID ولیکه");
if(!empId) return;

await addDoc(collection(db,"items"),{
serial: document.getElementById("serial").value || "",
doc: document.getElementById("doc").value || "",
date: document.getElementById("date").value || "",
giver: document.getElementById("giver").value || "",
receiver: document.getElementById("receiver").value || "",
deptField: document.getElementById("deptField").value || "",
rank: document.getElementById("rank").value || "",
item: document.getElementById("item").value || "",
spec: document.getElementById("spec").value || "",
sn: document.getElementById("sn").value || "",
source: document.getElementById("source").value || "",
color: document.getElementById("color").value || "",
qty: document.getElementById("qty").value || "",
unit: document.getElementById("unit").value || "",
price: document.getElementById("price").value || "",
total: document.getElementById("total").value || "",
note: document.getElementById("note").value || "",
dept: document.getElementById("dept").value || "",
type: document.getElementById("type").value || "",
id: empId
});

alert("✅ اضافه شو");

}catch(e){
alert("❌ error: "+e.message);
}
};

// delete
window.del=async function(id){
if(prompt("Password")!=="1234") return;
await deleteDoc(doc(db,"items",id));
};

// search
window.searchItems=function(){
let tbody=document.getElementById("tbody");
tbody.innerHTML="";
allItems.forEach(x=>{
if(
(document.getElementById("searchDept").value && x.dept===document.getElementById("searchDept").value) ||
(document.getElementById("searchId").value && x.id===document.getElementById("searchId").value)
){
draw(x);
}
});
};

// reset
window.resetTable=function(){
let tbody=document.getElementById("tbody");
tbody.innerHTML="";
allItems.forEach(draw);
};

</script>

</body>
</html>
