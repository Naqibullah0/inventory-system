<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
<meta charset="UTF-8">
<title>د اجناسو مدیریت سیستم</title>

<style>
body{font-family:Arial;background:#eef2f3;margin:0;direction:rtl;}
.header{background:#006400;color:#fff;padding:15px;text-align:center;font-size:22px;}
.box{background:#fff;margin:15px;padding:15px;border-radius:10px;}
input,select{padding:6px;margin:4px;border:1px solid #ccc;border-radius:5px;width:140px;}
button{background:#006400;color:white;padding:7px 12px;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#004d00;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;font-size:13px;}
th{background:#006400;color:white;}
</style>

</head>

<body>

<div class="header">د اجناسو رسمي مدیریت سیستم</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h3>ننوتل</h3>

<input id="phoneInput" placeholder="تلیفون نمبر">
<input id="pinInput" placeholder="پټ کوډ">

<select id="province">
<option value="">مرکزي اداره</option>
<option>کابل</option><option>کاپیسا</option><option>پنجشیر</option><option>پروان</option>
<option>میدان وردګ</option><option>لوګر</option><option>ننګرهار</option><option>لغمان</option>
<option>کنړ</option><option>نورستان</option><option>پکتیا</option><option>پکتیکا</option>
<option>خوست</option><option>کندهار</option><option>هلمند </option><option>روزګان</option>
<option>هرات</option><option>فراه</option><option>بادغیس</option><option>غور</option>
<option>بلخ</option><option>جوزجان</option><option>فاریاب</option><option>سرپل</option>
<option>تخار</option><option>بدخشان</option><option>بغلان</option><option>کندز</option>
<option>بامیان</option><option>دایکندی</option><option>نیمروز</option><option>اروزګان</option>
<option>زابل</option><option>بادغیس</option>
</select>

<br>
<button onclick="login()">داخل شه</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="box">

<!-- 17 FIELDS -->
<input id="serial" placeholder="ګڼه ">
<input id="doc" placeholder="د سند ګڼه">
<input id="date" placeholder="نېټه">
<input id="giver" placeholder="ورکوونکی">
<input id="receiver" placeholder="اخیستونکی">
<input id="department" placeholder="شعبه">
<select id="category">
<option value="">د جنس ډول</option>
<option>فرنیچر</option>
<option>مفروشات</option>
<option>برقي وسایل</option>
<option>لوښي</option>
<option>متفرقه</option>
</select>
<input id="rank" placeholder="بست">
<input id="item" placeholder="د جنس نوم">
<input id="spec" placeholder="مشخصات">
<input id="sn" placeholder="سریال نمبر">
<input id="source" placeholder="سرچینه">
<input id="color" placeholder="رنګ">
<input id="qty" type="number" placeholder="تعداد">
<input id="unit" placeholder="واحد">
<input id="price" type="number" placeholder="بیه">
<input id="total" placeholder="مجموعه" readonly>
<input id="note" placeholder="کتنې">

<br>

<button onclick="addItem()">اضافه کړه</button>
<button onclick="window.print()">چاپ</button>

</div>

<div class="box">

<input id="searchId" placeholder="ID لټون">
<button onclick="searchItems()">Search</button>
<button onclick="loadItems()">Reset</button>

<table>
<thead>
<tr>
<th>مسلسل نمبر</th>
<th>د سند ګڼه</th>
<th>نېټه</th>
<th> ورکوونکی </th>
<th> اخیستونکی </th>
<th>شعبه</th>
<th>بست</th>
<th>د جنس نوم</th>
<th> مشخصات</th>
<th>د سریال نمبر</th>
<th>سرچینه</th>
<th> رنګ</th>
<th> تعداد</th>
<th>واحد</th>
<th>فیات</th>
<th>مجموعه</th>
<th>ډول</th>
<th>ولایت</th>
<th>عمل</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseApp = initializeApp({
apiKey:"AIzaSyDQG_BNOSJievJwmpOU96pZcPnWzQW-Ebo",
authDomain:"inventory-system-64d88.firebaseapp.com",
projectId:"inventory-system-64d88"
});

const db = getFirestore(firebaseApp);

let currentProvince="";
let isAdmin=false;
let allItems=[];
let currentEditId = "";

/* LOGIN */
window.login=function(){

let phone=document.getElementById("phoneInput").value;
let pin=document.getElementById("pinInput").value;

const isCentral = (phone==="0700000000" && pin==="9999");

if(isCentral){
isAdmin=true;
currentProvince="مرکزي اداره";
}else{
isAdmin=false;
currentProvince=document.getElementById("province").value;

if(!currentProvince){
alert("ولایت انتخاب کړه!");
return;
}
}

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

loadItems();
};

/* TOTAL */
document.getElementById("qty").oninput =
document.getElementById("price").oninput=function(){
let q=document.getElementById("qty").value||0;
let p=document.getElementById("price").value||0;
document.getElementById("total").value = q * p;
};

/* ENTER NEXT */
document.querySelectorAll("input").forEach((el,i,arr)=>{
el.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
arr[i+1]?.focus();
}
});
});

/* LOAD DATA */
function loadItems(){
onSnapshot(collection(db,"items"),snap=>{
let tbody=document.getElementById("tbody");
tbody.innerHTML="";
allItems=[];

snap.forEach(d=>{
let x=d.data();
x.idd=d.id;

if(isAdmin || x.province===currentProvince){
allItems.push(x);

tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.giver||""}</td>
<td>${x.receiver||""}</td>
<td>${x.department||""}</td>
<td>${x.rank||""}</td>
<td>${x.item||""}</td>
<td>${x.spec||""}</td>
<td>${x.sn||""}</td>
<td>${x.source||""}</td>
<td>${x.color||""}</td>
<td>${x.qty||""}</td>
<td>${x.unit||""}</td>
<td>${x.price||""}</td>
<td>${x.total||""}</td>
<td>${x.category||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>`;
}
});
});
}

/* ADD ITEM */
window.addItem=async function(){

let id=prompt("ID ولیکه");
if(!id) return;

await addDoc(collection(db,"items"),{

serial:document.getElementById("serial").value,
doc:document.getElementById("doc").value,
date:document.getElementById("date").value,
giver:document.getElementById("giver").value,
receiver:document.getElementById("receiver").value,
department:document.getElementById("department").value,
rank:document.getElementById("rank").value,
item:document.getElementById("item").value,
category:document.getElementById("category").value,
spec:document.getElementById("spec").value,
sn:document.getElementById("sn").value,
source:document.getElementById("source").value,
color:document.getElementById("color").value,
qty:document.getElementById("qty").value,
unit:document.getElementById("unit").value,
price:document.getElementById("price").value,
total:document.getElementById("total").value,
note:document.getElementById("note").value,

province: currentProvince,
id:id

});

};

/* DELETE */
window.delItem=async function(id){
if(prompt("پټ کوډ")!=="1234") return;
await deleteDoc(doc(db,"items",id));
};

/* SEARCH */
window.searchItems=function(){
    let found = false;
    document.querySelectorAll("#app input").forEach(i=>i.value="");

let id=document.getElementById("searchId").value;
let tbody=document.getElementById("tbody");
tbody.innerHTML="";

allItems.forEach(x=>{
if(x.id===id){
found = true;
    currentEditId = x.idd;
    

// TABLE
tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.giver||""}</td>
<td>${x.receiver||""}</td>
<td>${x.rank||""}</td>
<td>${x.item||""}</td>
<td>${x.spec||""}</td>
<td>${x.sn||""}</td>
<td>${x.source||""}</td>
<td>${x.color||""}</td>
<td>${x.qty||""}</td>
<td>${x.unit||""}</td>
<td>${x.price||""}</td>
<td>${x.total||""}</td>
<td>${x.category||""}</td>
<td>${x.province||""}</td>
<td><button onclick="delItem('${x.idd}')">❌</button></td>
</tr>`;


// FILL FORM (17 BOXES)
document.getElementById("serial").value = x.serial || "";
document.getElementById("doc").value = x.doc || "";
document.getElementById("date").value = x.date || "";
document.getElementById("giver").value = x.giver || "";
document.getElementById("receiver").value = x.receiver || "";
document.getElementById("department").value = x.department || "";
document.getElementById("rank").value = x.rank || "";
document.getElementById("item").value = x.item || "";
document.getElementById("spec").value = x.spec || "";
document.getElementById("sn").value = x.sn || "";
document.getElementById("source").value = x.source || "";
document.getElementById("color").value = x.color || "";
document.getElementById("qty").value = x.qty || "";
document.getElementById("unit").value = x.unit || "";
document.getElementById("price").value = x.price || "";
document.getElementById("total").value = x.total || "";
document.getElementById("note").value = x.note || "";

// category هم که اضافه کړې وه
if(document.getElementById("category")){
document.getElementById("category").value = x.category || "";
}

}
});

};

</script>

</body>
</html>
