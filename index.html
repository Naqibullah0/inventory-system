<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سیستم اجناس</title>

<style>
body{font-family:Arial;background:#f4f7f9;margin:0;direction:rtl;}
.header{background:#006400;color:white;padding:15px;text-align:center;font-size:20px;}
.box{background:white;margin:15px;padding:15px;border-radius:10px;}
input,select{padding:6px;margin:4px;border:1px solid #ccc;border-radius:5px;}
button{background:#006400;color:white;padding:7px 12px;border:none;border-radius:5px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
th{background:#006400;color:white;}
</style>

</head>

<body>

<div class="header">د اجناسو رسمي مدیریت سیستم</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h3>ننوتل</h3>
<input id="phone" placeholder="تلیفون نمبر">
<input id="pin" placeholder="پټ کوډ">
<select id="province">
<option>کابل</option><option>کندهار</option><option>هلمند</option>
<option>هرات</option><option>بلخ</option><option>ننګرهار</option>
</select>
<button onclick="login()">داخل شه</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="box">

<input id="serial" placeholder="مسلسل نمبر">
<input id="doc" placeholder="د سند ګڼه">
<input id="date" placeholder="نېټه">
<input id="giver" placeholder="ورکوونکی">
<input id="receiver" placeholder="اخیستونکی">
<input id="deptField" placeholder="اړونده شعبه">
<input id="rank" placeholder="بست">
<input id="item" placeholder="د جنس نوم">
<input id="spec" placeholder="مشخصات">
<input id="sn" placeholder="سریال نمبر">
<input id="source" placeholder="سرچینه">
<input id="color" placeholder="رنګ">
<input id="qty" type="number" placeholder="تعداد">
<input id="unit" placeholder="واحد">
<input id="price" type="number" placeholder="فیات">
<input id="total" placeholder="مجموعه" readonly>
<input id="note" placeholder="کتنې">

<br>

<button onclick="addItem()">اضافه کړه</button>
<button onclick="window.print()">چاپ</button>

</div>

<div class="box">

<input id="searchId" placeholder="ID لټون">
<button onclick="searchItems()">Search</button>

<table>
<thead>
<tr>
<th>مسلسل</th><th>سند</th><th>نېټه</th><th>جنس</th><th>تعداد</th><th>ولایت</th><th>عمل</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDQG_BNOSJievJwmpOU96pZcPnWzQW-Ebo",
authDomain:"inventory-system-64d88.firebaseapp.com",
projectId:"inventory-system-64d88"
});

const db = getFirestore(app);

let currentProvince="";
let isAdmin=false;
let allItems=[];

// LOGIN
window.login=function(){
let phone=phoneInput.value;
let pin=pinInput.value;

if(phone==="0700000000" && pin==="9999"){
isAdmin=true;
}else{
currentProvince=province.value;
}

loginBox.style.display="none";
app.style.display="block";

loadItems();
};

// TOTAL
qty.oninput=price.oninput=function(){
total.value=(qty.value||0)*(price.value||0);
};

// ENTER NEXT
document.querySelectorAll("input").forEach((el,i,arr)=>{
el.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
arr[i+1]?.focus();
}
});
});

// LOAD
function loadItems(){
onSnapshot(collection(db,"items"),snap=>{
tbody.innerHTML="";
allItems=[];

snap.forEach(d=>{
let x=d.data();
x.idd=d.id;

if(isAdmin || x.province===currentProvince){
allItems.push(x);

tbody.innerHTML+=`
<tr>
<td>${x.serial||""}</td>
<td>${x.doc||""}</td>
<td>${x.date||""}</td>
<td>${x.item||""}</td>
<td>${x.qty||""}</td>
<td>${x.province||""}</td>
<td><button onclick="del('${x.idd}')">❌</button></td>
</tr>`;
}
});
});
}

// ADD
window.addItem=async function(){
let id=prompt("ID ولیکه");
if(!id) return;

await addDoc(collection(db,"items"),{
serial:serial.value,
doc:doc.value,
date:date.value,
giver:giver.value,
receiver:receiver.value,
deptField:deptField.value,
rank:rank.value,
item:item.value,
spec:spec.value,
sn:sn.value,
source:source.value,
color:color.value,
qty:qty.value,
unit:unit.value,
price:price.value,
total:total.value,
note:note.value,
province:isAdmin ? prompt("ولایت ولیکه") : currentProvince,
id:id
});
};

// DELETE
window.del=async function(id){
if(prompt("پټ کوډ")!=="1234") return;
await deleteDoc(doc(db,"items",id));
};

// SEARCH
window.searchItems=function(){
tbody.innerHTML="";
allItems.forEach(x=>{
if(x.id===searchId.value){
tbody.innerHTML+=`
<tr>
<td>${x.serial}</td>
<td>${x.doc}</td>
<td>${x.date}</td>
<td>${x.item}</td>
<td>${x.qty}</td>
<td>${x.province}</td>
<td></td>
</tr>`;
}
});
};

</script>

</body>
</html>
